<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Html Wallpaper Configurator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../web/src/style.css" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: https:; media-src 'self' file: https:; frame-src 'self' file: https:; object-src 'none';"
    />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <h2>Engine Settings</h2>
        <div id="env-form" class="form-grid"></div>
        <button id="btn-submit" class="primary-btn">Save & Build</button>
        <p id="status-msg"></p>
      </aside>

      <main class="content">
        <div class="header-row" id="top-list">
          <h2>Wallpapers Database</h2>
          <button id="btn-add-wp" class="secondary-btn ms-2">+ Add Media</button>
        </div>
        <div id="wallpapers-list" class="cards-grid"></div>
      </main>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
